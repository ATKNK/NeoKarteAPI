services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  web:
    build: .
    # command: tail -f /dev/null
    command: bash -c "rm -f tmp/pids/server.pid && bundle install &&  bundle exec rails s -b 0.0.0.0"
    # command: bash -c "rails new app --skip-git --api --database:postgres"
    volumes:
      - ./NeoKarteAPI:/NeoKarteAPI
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password

volumes:
  db-data:
